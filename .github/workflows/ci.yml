name: CI

on:
  push:
    branches: [main]

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Test
        run: go tool run test

      - name: Publish
        run: go run ./cmd/publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
