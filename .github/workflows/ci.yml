name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache: false

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-
            go-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Build and install NLopt 2.10.0
        run: |
          curl -L https://github.com/stevengj/nlopt/archive/refs/tags/v2.10.0.tar.gz | tar xz
          cd nlopt-2.10.0
          cmake -DBUILD_SHARED_LIBS=ON -DNLOPT_PYTHON=OFF -DNLOPT_OCTAVE=OFF -DNLOPT_MATLAB=OFF -DNLOPT_GUILE=OFF -DNLOPT_SWIG=OFF .
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Download modules and build tools
        run: |
          go mod download
          go tool templ version
          go tool staticcheck --version

      - name: Generate
        run: go tool run -skip=compress-statics generate

      - name: Build all packages
        run: go build all

      - name: Test
        run: go tool run test
        env:
          MONKS_ROOT: ${{ github.workspace }}

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache: false

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-
            go-${{ runner.os }}-

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Configure git credentials
        run: gh auth setup-git
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}

      - name: Publish
        run: go run ./cmd/publish
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          MONKS_ROOT: ${{ github.workspace }}

  deploy:
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache: false

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-
            go-${{ runner.os }}-

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy changed apps
        run: go run ./cmd/deploy --base ${{ github.event.before }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          MONKS_ROOT: ${{ github.workspace }}

  terraform:
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-apply
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache: false

      - name: Install fish
        run: sudo apt-get install -y fish

      - name: Convert zone files
        working-directory: aws
        run: fish convert-zones.fish

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: aws/terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: terraform init

      - name: Terraform apply
        working-directory: aws/terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_GANDI_PERSONAL_ACCESS_TOKEN: ${{ secrets.GANDI_TOKEN }}
        run: terraform apply -auto-approve
