name: CI

on:
  push:
    branches: [main]

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Download modules and build tools
        run: |
          go mod download
          go tool templ version
          go tool staticcheck --version

      - name: Generate
        run: go tool run -skip=compress-statics generate

      - name: Build all packages
        run: go build all

      - name: Test
        run: go tool run test
        env:
          MONKS_ROOT: ${{ github.workspace }}

      - name: Publish
        run: go run ./cmd/publish
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          MONKS_ROOT: ${{ github.workspace }}
