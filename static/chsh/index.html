      <div class="pv3 ph2 copy">
        <div class="e-content">
          <p>A “non-standard shell” is a shell that’s not listed in /etc/shells. So, use <code class="highlighter-rouge">where &lt;shell&gt;</code> to find shell path, and add it to <code class="highlighter-rouge">/etc/shells</code>.</p>
          <p>Then <code class="highlighter-rouge">chsh -s &lt;shell-path&gt;</code></p>
        </div>
