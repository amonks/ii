[[task]]
  id = "thor"
  type = "long"
  dependencies = [
    "apps/ping/dev",
    "apps/map/dev",
    "apps/golink/dev",
    "apps/traffic/dev",
    "apps/posts/dev",
    "apps/air/dev",
  ]
  cmd = """
    go run ./apps/proxy \
      -httpRedirectAddress=0.0.0.0:8080 \
      -httpsAddress=0.0.0.0:4433 \
      -acmeConfig=acme-thor.toml \
      ping:3005 \
      map:3006 \
      golink:3007 \
      traffic:3008 \
      posts:3009 \
      air:3010
  """

[[task]]
  id = "brigid"
  type = "long"
  dependencies = [
    "apps/ping/dev",
    "apps/map/dev",
    "apps/golink/dev",
    "apps/traffic/dev",
    "apps/posts/dev",
  ]
  cmd = """
    go run ./apps/proxy \
      -httpRedirectAddress=0.0.0.0:80 \
      -httpsAddress=0.0.0.0:443 \
      -acmeConfig=acme-brigid.toml \
      ping:3005 \
      map:3006 \
      golink:3007 \
      traffic:3008 \
      posts:3009
  """

[[task]]
  id = "fly"
  type = "long"
  dependencies = [
    "apps/map/start",
    "apps/traffic/start",
  ]
  cmd = """
    ./bin/proxy \
      -httpRedirectAddress=0.0.0.0:8080 \
      -httpsAddress=0.0.0.0:4433 \
      -acmeConfig=acme-fly.toml \
      map:3006 \
      traffic:3008
  """


[[task]]
  id = "build"
  type = "group"
  dependencies = [
    "apps/proxy/build",
    "apps/ping/build",
    "apps/map/build",
    "apps/golink/build",
    "apps/traffic/build",
    "apps/posts/build",
  ]

