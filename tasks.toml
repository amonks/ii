[[task]]
id = 'aws-convert-zones'
type = 'short'
cmd = 'cd aws && fish convert-zones.fish'

[[task]]
id = 'brigid'
type = 'group'
dependencies = [
  'apps/directory/dev',
  'apps/golink/dev',
  'apps/map/dev',
  'apps/ping/dev',
  'apps/posts/dev',
  'apps/sms/dev',
  'apps/traffic/dev',
  'apps/youtube/dev',
  'brigid-proxy',
  'pkg/templib/dev'
]

[[task]]
id = 'brigid-proxy'
type = 'long'
watch = ['apps/proxy/**', 'apps/proxy/*']
cmd = 'go run ./apps/proxy -machine=brigid'

[[task]]
id = 'build'
type = 'group'
dependencies = [
  'apps/air/build',
  'apps/directory/build',
  'apps/golink/build',
  'apps/mailer/build',
  'apps/map/build',
  'apps/movies/build',
  'apps/ping/build',
  'apps/posts/build',
  'apps/proxy/build',
  'apps/reddit/build',
  'apps/sms/build',
  'apps/traffic/build',
  'apps/youtube/build',
  'pkg/templib/build'
]

[[task]]
id = 'fly'
type = 'group'
dependencies = [
  'apps/mailer/start',
  'apps/map/start',
  'apps/traffic/start',
  'fly-proxy'
]

[[task]]
id = 'fly-proxy'
type = 'long'
watch = ['apps/proxy/**', 'apps/proxy/*']
cmd = './bin/proxy -machine=fly'

[[task]]
id = 'taskmaker'
type = 'short'
cmd = 'go run ./cmd/taskmaker'

[[task]]
id = 'terraform-apply'
type = 'short'
dependencies = [
  'aws-convert-zones'
]
cmd = 'source aws/.envrc && cd aws/terraform && yes yes | terraform apply'

[[task]]
id = 'terraform-fmt'
type = 'short'
dependencies = [
  'aws-convert-zones'
]
cmd = 'source aws/.envrc && cd aws/terraform && terraform fmt'

[[task]]
id = 'terraform-init'
type = 'short'
cmd = 'source aws/.envrc && cd aws/terraform && terraform init'

[[task]]
id = 'terraform-plan'
type = 'short'
dependencies = [
  'aws-convert-zones'
]
cmd = 'source aws/.envrc && cd aws/terraform && terraform plan'

[[task]]
id = 'thor'
type = 'group'
dependencies = [
  'apps/air/dev',
  'apps/movies/dev',
  'apps/reddit/dev',
  'apps/traffic/dev',
  'pkg/templib/dev',
  'thor-proxy'
]

[[task]]
id = 'thor-proxy'
type = 'long'
watch = ['apps/proxy/**', 'apps/proxy/*']
cmd = 'go run ./apps/proxy -machine=thor'
