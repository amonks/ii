[[task]]
id = 'aws-convert-zones'
type = 'short'
cmd = 'cd aws && fish convert-zones.fish'

[[task]]
id = 'brigid'
type = 'long'
dependencies = [
  'apps/directory/dev',
  'apps/dogs/dev',
  'apps/golink/dev',
  'apps/homepage/dev',
  'apps/map/dev',
  'apps/ping/dev',
  'apps/scrobbles/dev',
  'apps/sms/dev',
  'apps/traffic/dev',
  'apps/writing/dev',
  'apps/youtube/dev',
  'brigid-proxy',
  'templ'
]

[[task]]
id = 'brigid-proxy'
type = 'long'
watch = ['apps/proxy/**', 'apps/proxy/*']
cmd = 'go run ./apps/proxy -machine=brigid'

[[task]]
id = 'build'
type = 'short'
dependencies = [
  'apps/air/build',
  'apps/directory/build',
  'apps/dogs/build',
  'apps/errlog/build',
  'apps/golink/build',
  'apps/homepage/build',
  'apps/mailer/build',
  'apps/mailrules/build',
  'apps/map/build',
  'apps/monitor/build',
  'apps/movies/build',
  'apps/ping/build',
  'apps/proxy/build',
  'apps/reddit/build',
  'apps/scrobbles/build',
  'apps/sms/build',
  'apps/traffic/build',
  'apps/writing/build',
  'apps/youtube/build',
  'templ'
]

[[task]]
id = 'deploy'
type = 'short'
cmd = 'go run ./cmd/deploy'

[[task]]
id = 'fly'
type = 'long'
dependencies = [
  'apps/dogs/start',
  'apps/errlog/start',
  'apps/homepage/start',
  'apps/mailer/start',
  'apps/map/start',
  'apps/traffic/start',
  'apps/writing/start',
  'fly-proxy'
]

[[task]]
id = 'fly-proxy'
type = 'long'
watch = ['apps/proxy/**', 'apps/proxy/*']
cmd = './bin/proxy -machine=fly'

[[task]]
id = 'taskmaker'
type = 'short'
cmd = 'go run ./cmd/taskmaker'

[[task]]
id = 'templ'
type = 'short'
watch = ['**/*.templ']
cmd = 'go run github.com/a-h/templ/cmd/templ generate'

[[task]]
id = 'terraform-apply'
type = 'short'
dependencies = [
  'aws-convert-zones'
]
cmd = 'source aws/.envrc && cd aws/terraform && yes yes | terraform apply'

[[task]]
id = 'terraform-fmt'
type = 'short'
dependencies = [
  'aws-convert-zones'
]
cmd = 'source aws/.envrc && cd aws/terraform && terraform fmt'

[[task]]
id = 'terraform-init'
type = 'short'
cmd = 'source aws/.envrc && cd aws/terraform && terraform init'

[[task]]
id = 'terraform-plan'
type = 'short'
dependencies = [
  'aws-convert-zones'
]
cmd = 'source aws/.envrc && cd aws/terraform && terraform plan'

[[task]]
id = 'thor'
type = 'long'
dependencies = [
  'apps/air/dev',
  'apps/dogs/dev',
  'apps/monitor/dev',
  'apps/movies/dev',
  'apps/reddit/dev',
  'apps/traffic/dev',
  'templ',
  'thor-proxy'
]

[[task]]
id = 'thor-proxy'
type = 'long'
watch = ['apps/proxy/**', 'apps/proxy/*']
cmd = 'go run ./apps/proxy -machine=thor'
