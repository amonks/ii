[[task]]
id = 'taskmaker'
type = 'short'
cmd = 'go run ./cmd/taskmaker'

[[task]]
id = 'build'
type = 'group'
dependencies = [
  'apps/proxy/build',
  'apps/posts/build',
  'apps/youtube/build',
  'apps/mailer/build',
  'apps/map/build',
  'apps/golink/build',
  'apps/traffic/build',
  'apps/air/build',
  'apps/sms/build',
  'apps/ping/build'
]

[[task]]
id = 'brigid'
type = 'group'
dependencies = [
  'brigid-proxy',
  'apps/sms/dev',
  'apps/ping/dev',
  'apps/map/dev',
  'apps/golink/dev',
  'apps/traffic/dev',
  'apps/posts/dev',
  'apps/youtube/dev'
]

[[task]]
id = 'brigid-proxy'
type = 'long'
watch = ['apps/proxy/**', 'apps/proxy/*']
cmd = 'go run ./apps/proxy -machine=brigid'

[[task]]
id = 'fly'
type = 'group'
dependencies = [
  'fly-proxy',
  'apps/map/start',
  'apps/traffic/start',
  'apps/mailer/start'
]

[[task]]
id = 'fly-proxy'
type = 'long'
watch = ['apps/proxy/**', 'apps/proxy/*']
cmd = './bin/proxy -machine=fly'

[[task]]
id = 'thor'
type = 'group'
dependencies = [
  'thor-proxy',
  'apps/ping/dev',
  'apps/map/dev',
  'apps/golink/dev',
  'apps/traffic/dev',
  'apps/youtube/dev'
]

[[task]]
id = 'thor-proxy'
type = 'long'
watch = ['apps/proxy/**', 'apps/proxy/*']
cmd = 'go run ./apps/proxy -machine=thor'
