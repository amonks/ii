[[task]]
  id = "local"
  type = "long"
  dependencies = [
    "apps/ping/dev",
    "apps/map/dev",
    "apps/golink/dev",
  ]
  cmd = """
    go run ./apps/proxy \
      -httpRedirectAddress=0.0.0.0:80 \
      -httpsAddress=0.0.0.0:443 \
      -acmeConfig=acme-brigid.toml \
      ping:3005 \
      map:3006 \
      golink:3007
  """

[[task]]
  id = "fly"
  type = "long"
  dependencies = [
    "apps/map/start",
  ]
  cmd = """
    ./bin/proxy \
      -httpRedirectAddress=0.0.0.0:8080 \
      -httpsAddress=0.0.0.0:4433 \
      -acmeConfig=acme-fly.toml \
      map:3006
  """


[[task]]
  id = "build"
  type = "group"
  dependencies = [
    "apps/proxy/build",
    "apps/ping/build",
    "apps/map/build",
    "apps/golink/build",
  ]

