app = "monks-proxy"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile.fly"
  ignorefile = "apps/proxy/Dockerfile.fly.dockerignore"

[env]
  MONKS_APP_NAME = "proxy"
  MONKS_ROOT = "/app"
  MONKS_DATA = "/data"
  TSNET_FORCE_LOGIN = "1"

[[vm]]
  size = "shared-cpu-8x"
  memory = "2gb"

[[mounts]]
  source = "monks_proxy_data"
  destination = "/data"

[[services]]
  internal_port = 4433
  protocol = "tcp"
  [[services.ports]]
    port = 443
    handlers = ["proxy_proto"]

[[services]]
  internal_port = 8080
  protocol = "tcp"
  [[services.ports]]
    port = 80
    handlers = ["proxy_proto"]

[metrics]
  port = 9999
  path = "/metrics"
