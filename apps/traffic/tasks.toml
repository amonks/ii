[[task]]
  id = "dev"
  type = "long"
  dependencies = ["build"]
  cmd = "../../bin/traffic"

[[task]]
  id = "start"
  type = "long"
  cmd = "../../bin/traffic"

[[task]]
  id = "build"
  type = "short"
  watch = ["**/*.go", "*.go"]
  dependencies = ["build-css"]
  env = { SQLITE_ENABLE_LOCKING_STYLE = "1" }
  cmd = "go build -o ../../bin/ ."

[[task]]
  id = "build-css"
  type = "short"
  watch = [
    "css/*.css",
    "templates/*.gohtml"
  ]
  dependencies = ["install-css"]
  cmd = """
    cd css && \
      npx tailwindcss \
        -i ./index.css \
        -o ../static/index.css
  """

[[task]]
  id = "install-css"
  type = "short"
  cmd = "cd css && npm install"

