[[task]]
  id = "dev"
  type = "long"
  dependencies = ["build"]
  cmd = "../../bin/vault"

[[task]]
  id = "start"
  type = "long"
  cmd = "../../bin/vault"

[[task]]
  id = "build"
  type = "short"
  watch = ["**/*.go", "*.go"]
  cmd = "go build -o ../../bin/ ."

[[task]]
  id = "tidy"
  type = "short"
  cmd = "go mod tidy -e"

[[task]]
  id = "generate"
  type = "short"
  dependencies = ["tidy"]
