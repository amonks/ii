[[task]]
  id = "dev"
  type = "long"
  cmd = "SQLITE_ENABLE_LOCKING_STYLE=1 go run ."
  watch = ["**/*.go", "*.go"]
  dependencies = ["build-css"]

[[task]]
  id = "build"
  type = "short"
  dependencies = ["build-css"]
  cmd = "cd $MONKS_ROOT && SQLITE_ENABLE_LOCKING_STYLE=1 go build -o ./bin/ ./apps/map"

[[task]]
  id = "start"
  type = "long"
  cmd = "$MONKS_ROOT/bin/map"

[[task]]
  id = "build-css"
  type = "short"
  dependencies = ["install-css"]
  watch = [
    "css/*.css",
    "templates/*.gohtml"
  ]
  cmd = """
    cd css
    npx tailwindcss \
      -i ./index.css \
      -o ../static/index.css
  """

[[task]]
  id = "install-css"
  type = "short"
  cmd = "cd css && npm install"

