<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Tracker</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 16px;
        max-width: 100%;
        box-sizing: border-box;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 1rem;
        text-align: center;
      }

      .calendar {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .calendar th {
        padding: 8px;
        background-color: #f0f0f0;
        text-align: center;
        font-weight: 600;
      }

      .calendar td {
        border: 1px solid #ddd;
        height: 100px;
        vertical-align: top;
        padding: 8px;
        position: relative;
      }

      .calendar td:last-child {
        background-color: #f0f8ff; /* Light blue highlight for today */
      }

      .day-header {
        font-weight: bold;
        margin-bottom: 8px;
        text-align: center;
      }

      .show-item {
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        position: relative;
      }

      .show-item input[type="checkbox"] {
        margin-right: 8px;
      }

      .show-item label {
        flex: 1;
        word-break: break-word;
      }

      .delete-btn {
        display: none;
        cursor: pointer;
        color: #f44336;
        margin-left: 5px;
        font-size: 16px;
        opacity: 0.7;
      }

      .delete-btn:hover {
        opacity: 1;
      }

      .show-item:hover .delete-btn {
        display: block;
      }

      .add-btn {
        position: absolute;
        bottom: 5px;
        right: 5px;
        width: 24px;
        height: 24px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 50%;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
      }

      .modal-content {
        background-color: white;
        margin: 15% auto;
        padding: 20px;
        border-radius: 8px;
        width: 80%;
        max-width: 500px;
      }

      .close {
        float: right;
        font-size: 24px;
        font-weight: bold;
        cursor: pointer;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
      }

      .form-group input {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
      }

      .submit-btn {
        background-color: #4caf50;
        color: white;
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }

      @media screen and (max-width: 768px) {
        .calendar th,
        .day-header {
          font-size: 0.8rem;
        }

        .calendar td {
          height: auto;
          min-height: 80px;
          padding: 4px;
        }

        .show-item {
          font-size: 0.9rem;
        }
      }

      .clear-storage-btn {
        background-color: #f44336;
        color: white;
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        margin-top: 16px;
      }

      .actions {
        display: flex;
        justify-content: center;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <h1>TV Show Tracker</h1>

    <table class="calendar">
      <thead>
        <tr id="calendar-header"></tr>
      </thead>
      <tbody>
        <tr id="calendar-row"></tr>
      </tbody>
    </table>

    <div class="actions">
      <button class="clear-storage-btn" id="clearAllDataBtn">
        Clear All Data
      </button>
    </div>

    <div id="addShowModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Add New Show</h2>
        <form id="addShowForm">
          <div class="form-group">
            <label for="showName">Show Name:</label>
            <input type="text" id="showName" required />
          </div>
          <input type="hidden" id="showDay" />
          <button type="submit" class="submit-btn">Add Show</button>
        </form>
      </div>
    </div>

    <script type="module">
      // Data model
      let shows = [];
      const daysOfWeek = [
        "Sunday",
        "Monday",
        "Tuesday",
        "Wednesday",
        "Thursday",
        "Friday",
        "Saturday",
      ];
      const shortDaysOfWeek = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      let selectedDay = null;

      // Load data from server
      async function loadShows() {
        try {
          const response = await fetch("storage");
          const data = await response.json();
          if (data && data.tvShows) {
            shows = JSON.parse(data.tvShows);
          }
        } catch (error) {
          console.error("Error loading shows:", error);
        }
      }

      // Save data to server
      async function saveShows() {
        try {
          await fetch("storage", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              tvShows: JSON.stringify(shows),
            }),
          });
        } catch (error) {
          console.error("Error saving shows:", error);
        }
      }

      // Initialize calendar
      function initCalendar() {
        const calendarRow = document.getElementById("calendar-row");
        const calendarHeader = document.getElementById("calendar-header");
        calendarRow.innerHTML = "";
        calendarHeader.innerHTML = "";

        // Get current date
        const today = new Date();

        // Create cells for each day - last 7 days with today on the far right
        for (let i = 0; i < 7; i++) {
          // Calculate the date for this cell (6 days ago to today)
          const cellDate = new Date(today);
          cellDate.setDate(today.getDate() - 6 + i);

          // Format the date
          const formattedDate = `${
            cellDate.getMonth() + 1
          }/${cellDate.getDate()}`;

          // Create header cell with the day name
          const headerCell = document.createElement("th");
          const dayOfWeek = shortDaysOfWeek[cellDate.getDay()];
          headerCell.textContent = `${dayOfWeek} ${formattedDate}`;
          calendarHeader.appendChild(headerCell);

          // Create body cell
          const cell = document.createElement("td");

          // Highlight today's cell
          if (i === 6) {
            cell.style.backgroundColor = "#f9f9f9";
          }

          // Create container for shows
          const showsContainer = document.createElement("div");
          showsContainer.id = `shows-${i}`;
          cell.appendChild(showsContainer);

          // Create add button
          const addBtn = document.createElement("button");
          addBtn.className = "add-btn";
          addBtn.textContent = "+";
          addBtn.onclick = function () {
            openAddShowModal(i);
          };
          cell.appendChild(addBtn);

          calendarRow.appendChild(cell);
        }

        renderShows();
      }

      // Render shows in the calendar
      function renderShows() {
        // Clear all show containers
        for (let i = 0; i < 7; i++) {
          document.getElementById(`shows-${i}`).innerHTML = "";
        }

        // Get current date for day mapping
        const today = new Date();

        // Populate shows for each day
        shows.forEach((show, index) => {
          const dayOfWeek = daysOfWeek.findIndex(
            (day) => day.toLowerCase() === show.day.toLowerCase(),
          );

          if (dayOfWeek !== -1) {
            // Calculate which column this show should appear in
            for (let i = 0; i < 7; i++) {
              const cellDate = new Date(today);
              cellDate.setDate(today.getDate() - 6 + i);

              // If the day of week matches this cell
              if (cellDate.getDay() === dayOfWeek) {
                const container = document.getElementById(`shows-${i}`);

                const showItem = document.createElement("div");
                showItem.className = "show-item";

                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.id = `show-${index}`;

                // Get the date for this cell
                const cellDate = new Date(today);
                cellDate.setDate(today.getDate() - 6 + i);

                // Format the cell date for comparison
                const cellDateStr = `${cellDate.getFullYear()}-${(
                  cellDate.getMonth() + 1
                )
                  .toString()
                  .padStart(2, "0")}-${cellDate
                  .getDate()
                  .toString()
                  .padStart(2, "0")}`;

                // Check if the show has been watched for this cell's date
                // A show is watched if lastWatched date is >= the air date
                checkbox.checked = show.lastWatched >= cellDateStr;

                checkbox.onchange = function () {
                  toggleWatched(index, i);
                };

                const label = document.createElement("label");
                label.htmlFor = `show-${index}`;
                label.textContent = show.name;

                // Create delete button
                const deleteBtn = document.createElement("span");
                deleteBtn.className = "delete-btn";
                deleteBtn.innerHTML = "🗑️";
                deleteBtn.title = "Remove show";
                deleteBtn.onclick = function (e) {
                  e.stopPropagation(); // Prevent checkbox toggle
                  deleteShow(index);
                };

                showItem.appendChild(checkbox);
                showItem.appendChild(label);
                showItem.appendChild(deleteBtn);
                container.appendChild(showItem);
              }
            }
          }
        });
      }

      // Open add show modal
      function openAddShowModal(dayIndex) {
        // Calculate which day of the week this cell represents
        const today = new Date();
        const cellDate = new Date(today);
        cellDate.setDate(today.getDate() - 6 + dayIndex);

        // Get the day name for this date
        const dayOfWeek = cellDate.getDay(); // 0 = Sunday, 1 = Monday, etc.
        selectedDay = daysOfWeek[dayOfWeek];

        document.getElementById("showDay").value = selectedDay;
        document.getElementById("addShowModal").style.display = "block";
        // Set focus to the show name field
        setTimeout(() => document.getElementById("showName").focus(), 10);
      }

      // Close add show modal
      function closeAddShowModal() {
        document.getElementById("addShowModal").style.display = "none";
        document.getElementById("addShowForm").reset();
      }

      // Add new show
      async function addShow(event) {
        event.preventDefault();

        const name = document.getElementById("showName").value.trim();
        const day = document.getElementById("showDay").value;

        if (name && day) {
          // Find the most recent airdate that has passed
          const currentDate = new Date();
          const dayIndex = daysOfWeek.findIndex((d) => d === day);

          // Clone current date to avoid modifying it
          const lastAirDate = new Date(currentDate);

          // Calculate days to go back to the last airdate
          const currentDayIndex = currentDate.getDay(); // 0 = Sunday, 1 = Monday, etc.
          let daysToGoBack = (currentDayIndex - dayIndex + 7) % 7;

          // Special case: if today is the show's day, we want last week's episode
          if (daysToGoBack === 0) {
            daysToGoBack = 7;
          }

          // Go back to the last airdate
          lastAirDate.setDate(currentDate.getDate() - daysToGoBack);

          // Format the date
          const formattedDate = `${lastAirDate.getFullYear()}-${(
            lastAirDate.getMonth() + 1
          )
            .toString()
            .padStart(2, "0")}-${lastAirDate
            .getDate()
            .toString()
            .padStart(2, "0")}`;

          shows.push({
            name: name,
            day: day,
            lastWatched: formattedDate,
          });

          await saveShows();
          renderShows();
          closeAddShowModal();
        }
      }

      // Toggle watched status
      async function toggleWatched(index, cellIndex) {
        const show = shows[index];

        // Get the date of the cell being toggled
        const today = new Date();
        const cellDate = new Date(today);
        cellDate.setDate(today.getDate() - 6 + cellIndex);

        // Format the cell date for storage
        const cellDateStr = `${cellDate.getFullYear()}-${(
          cellDate.getMonth() + 1
        )
          .toString()
          .padStart(2, "0")}-${cellDate.getDate().toString().padStart(2, "0")}`;

        // Get the show's day index
        const dayIndex = daysOfWeek.findIndex((d) => d === show.day);

        // If cell date doesn't match show's air day, do nothing
        if (cellDate.getDay() !== dayIndex) {
          console.log("This show doesn't air on this day");
          return;
        }

        // If already watched (lastWatched >= this date), unmark by setting to previous episode
        if (show.lastWatched >= cellDateStr) {
          // Find the previous episode date
          const prevEpisodeDate = new Date(cellDate);
          prevEpisodeDate.setDate(cellDate.getDate() - 7); // One week earlier

          show.lastWatched = `${prevEpisodeDate.getFullYear()}-${(
            prevEpisodeDate.getMonth() + 1
          )
            .toString()
            .padStart(2, "0")}-${prevEpisodeDate
            .getDate()
            .toString()
            .padStart(2, "0")}`;
        } else {
          // Mark as watched up to this episode
          show.lastWatched = cellDateStr;
        }

        await saveShows();
        renderShows(); // Refresh the UI
      }

      // Delete a specific show
      async function deleteShow(index) {
        if (confirm(`Remove "${shows[index].name}" from your list?`)) {
          shows.splice(index, 1);
          await saveShows();
          renderShows();
        }
      }

      // Clear all data
      async function clearAllData() {
        if (confirm("Are you sure you want to clear all your show data?")) {
          shows = [];
          await saveShows();
          renderShows();
        }
      }

      // Initialize app
      async function init() {
        await loadShows();
        initCalendar();
        renderShows();

        // Set up event listeners
        document
          .getElementById("addShowForm")
          .addEventListener("submit", addShow);
        document
          .querySelector(".close")
          .addEventListener("click", closeAddShowModal);
        document
          .getElementById("clearAllDataBtn")
          .addEventListener("click", clearAllData);

        // Close modal when clicking outside
        window.addEventListener("click", function (event) {
          if (event.target == document.getElementById("addShowModal")) {
            closeAddShowModal();
          }
        });

        // Handle escape key to close modal
        document.addEventListener("keydown", function (event) {
          if (
            event.key === "Escape" &&
            document.getElementById("addShowModal").style.display === "block"
          ) {
            closeAddShowModal();
          }
        });
      }

      // Start the app when DOM is loaded
      document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
