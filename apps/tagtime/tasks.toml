[[task]]
  id = "build"
  type = "short"
  watch = ["**/*.go", "*.go"]
  env = { SQLITE_ENABLE_LOCKING_STYLE = "1" }
  cmd = "go build -o ../../bin/ ."

[[task]]
  id = "dev"
  type = "long"
  dependencies = ["build"]
  cmd = "../../bin/tagtime"

[[task]]
  id = "tidy"
  type = "short"
  cmd = "GOWORK=off go mod tidy"

[[task]]
  id = "xcframework"
  type = "short"
  cmd = "test \"$(uname)\" = Darwin || { echo 'skipping xcframework (requires macOS)'; exit 0; }; go tool gomobile init && rm -rf ios/Mobile.xcframework && GOWORK=off go tool gomobile bind -target ios,iossimulator -o ios/Mobile.xcframework ./mobile"
  dependencies = ["tidy"]

[[task]]
  id = "generate"
  type = "short"
  dependencies = ["xcframework", "tidy"]
