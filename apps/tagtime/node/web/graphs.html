<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="base-path" content="{{.BasePath}}">
  <title>TagTime - Graphs</title>
  <link rel="stylesheet" href="{{.BasePath}}/style.css">
</head>
<body>
  <nav>
    <a href="{{.BasePath}}/">Pings</a>
    <a href="{{.BasePath}}/search">Search</a>
    <a href="{{.BasePath}}/graphs">Graphs</a>
    <a href="{{.BasePath}}/settings">Settings</a>
  </nav>

  <h1>Time by Tag</h1>

  <div class="window-select">
    <a href="{{.BasePath}}/graphs?window=hour" {{if eq .Window "hour"}}class="active"{{end}}>Hourly</a>
    <a href="{{.BasePath}}/graphs?window=day" {{if eq .Window "day"}}class="active"{{end}}>Daily</a>
    <a href="{{.BasePath}}/graphs?window=week" {{if eq .Window "week"}}class="active"{{end}}>Weekly</a>
  </div>

  <canvas id="chart"></canvas>

  <script src="{{.BasePath}}/graphs.js"></script>
</body>
</html>
