<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base href="{{BASE_PATH}}">
<title>breadcrumbs</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  body { margin: 0; }
  #map { position: absolute; top: 0; bottom: 0; width: 100%; }
  #stats {
    position: absolute; top: 10px; right: 10px; z-index: 1;
    background: rgba(0,0,0,0.75); color: #fff; padding: 10px 14px;
    border-radius: 6px; font: 12px/1.6 monospace;
    pointer-events: none;
  }
  #stats .label { color: #999; }
  #stats .value { color: #fff; }
  #stats .stale { opacity: 0.5; }
</style>
</head>
<body>
<div id="map"></div>
<div id="stats" class="stale">loading…</div>
<script>
const clientID = crypto.randomUUID().replace(/-/g, '');
const base = document.baseURI.replace(/\/$/, '');
const tileURL = base + '/tiles/{z}/{x}/{y}?client=' + clientID;

// Parse #z/lat/lon from URL hash, fall back to defaults.
function parseHash() {
  const m = location.hash.match(/^#(\d+(?:\.\d+)?)\/(-?\d+(?:\.\d+)?)\/(-?\d+(?:\.\d+)?)$/);
  if (m) return { zoom: +m[1], center: [+m[3], +m[2]] };
  return { zoom: 10, center: [-87.65, 41.88] };
}
const initial = parseHash();

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      'osm': {
        type: 'raster',
        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
        tileSize: 256,
        attribution: '&copy; OpenStreetMap contributors',
      },
      'track': {
        type: 'vector',
        tiles: [tileURL],
        minzoom: 0,
        maxzoom: 22,
      },
    },
    layers: [
      {
        id: 'osm',
        type: 'raster',
        source: 'osm',
      },
      {
        id: 'track-line',
        type: 'line',
        source: 'track',
        'source-layer': 'track',
        paint: {
          'line-color': '#e03030',
          'line-width': 2.5,
          'line-opacity': 0.85,
        },
      },
    ],
  },
  center: initial.center,
  zoom: initial.zoom,
});

// Sync URL hash with viewport.
map.on('moveend', function() {
  const c = map.getCenter();
  const z = map.getZoom().toFixed(1);
  history.replaceState(null, '', '#' + z + '/' + c.lat.toFixed(6) + '/' + c.lng.toFixed(6));
});

// SSE: listen for tile-updated events and reload affected tiles.
const events = new EventSource(base + '/events?client=' + clientID);
events.addEventListener('tile-updated', function(e) {
  const src = map.getSource('track');
  if (src) {
    // setTiles forces a reload of all tiles from the source.
    src.setTiles([tileURL]);
  }
});
events.onerror = function() {
  // On disconnect, do a full source reload when reconnected.
  setTimeout(function() {
    const src = map.getSource('track');
    if (src) {
      src.setTiles([tileURL]);
    }
  }, 2000);
};

// Stats overlay: poll /stats every 5s.
function formatTime(nsEpoch) {
  if (!nsEpoch) return '—';
  const d = new Date(Number(nsEpoch) / 1e6);
  const ago = Math.round((Date.now() - d.getTime()) / 1000);
  const unit = ago < 60 ? ago + 's' : ago < 3600 ? Math.round(ago/60) + 'm' : Math.round(ago/3600) + 'h';
  return unit + ' ago';
}
function refreshStats() {
  fetch(base + '/stats', { headers: { 'Accept': 'application/json' } })
    .then(r => r.json())
    .then(s => {
      const el = document.getElementById('stats');
      const lp = s.latest_point;
      const lines = [
        '<span class="label">points:</span> <span class="value">' + s.count.toLocaleString() + '</span>',
        '<span class="label">latest:</span> <span class="value">' + formatTime(lp && lp.timestamp) + '</span>',
        '<span class="label">fwd queue:</span> <span class="value">' + (s.forward_queue_size || 0).toLocaleString() + '</span>',
        '<span class="label">fwd watermark:</span> <span class="value">' + formatTime(s.forward_watermark) + '</span>',
      ];
      if (lp) {
        lines.push('<span class="label">pos:</span> <span class="value">' + lp.latitude.toFixed(4) + ', ' + lp.longitude.toFixed(4) + '</span>');
      }
      el.innerHTML = lines.join('<br>');
      el.classList.remove('stale');
    })
    .catch(() => {
      document.getElementById('stats').classList.add('stale');
    });
}
refreshStats();
setInterval(refreshStats, 5000);
</script>
</body>
</html>
