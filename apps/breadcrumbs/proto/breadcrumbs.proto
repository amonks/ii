syntax = "proto3";
package breadcrumbs;

option go_package = "monks.co/apps/breadcrumbs/proto";

message Point {
    int64  timestamp            = 1;  // nanoseconds since Unix epoch
    double latitude             = 2;
    double longitude            = 3;
    double altitude             = 4;
    double ellipsoidal_altitude = 5;
    double horizontal_accuracy  = 6;
    double vertical_accuracy    = 7;
    double speed                = 8;
    double speed_accuracy       = 9;
    double course               = 10;
    double course_accuracy      = 11;
    int32  floor                = 12;
    bool   is_simulated         = 13;
    bool   is_from_accessory    = 14;
}

message Track {
    repeated Point points = 1;
}

message IngestResponse {
    int64 watermark = 1;
}

message FlushResponse {
    int64 watermark = 1;
    int32 points_forwarded = 2;
}

message TileUpdated {
    int32 z = 1;
    int32 x = 2;
    int32 y = 3;
}

message StatsResponse {
    int64 count = 1;
    Point latest_point = 2;  // most recent point, or absent if empty
    int64 forward_watermark = 3;   // timestamp of last forwarded point (0 if none)
    int64 forward_queue_size = 4;  // number of points waiting to be forwarded
}
