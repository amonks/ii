<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}} - God's Teeth Notes</title>
    <style>
      @font-face {
        font-family: "Triplicate";
        src: url("/fonts/Triplicate OT A Regular.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: "Triplicate";
        src: url("/fonts/Triplicate OT A Bold.otf") format("opentype");
        font-weight: bold;
        font-style: normal;
      }
      @font-face {
        font-family: "Triplicate";
        src: url("/fonts/Triplicate OT A Italic.otf") format("opentype");
        font-weight: normal;
        font-style: italic;
      }
      @font-face {
        font-family: "Triplicate";
        src: url("/fonts/Triplicate OT A Bold Italic.otf") format("opentype");
        font-weight: bold;
        font-style: italic;
      }
      body {
        font-family: "Triplicate", "Courier New", monospace;
        line-height: 1.6;
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
        background: #faf9f6;
        color: #000;
      }
      h1 {
        color: #000;
        border-bottom: 2px solid #000;
        padding-bottom: 0.5em;
        margin-top: 1.5em;
      }
      h2 {
        color: #000;
        border-bottom: 1px solid #ccc;
        padding-bottom: 0.3em;
        margin-top: 1.5em;
      }
      h3,
      h4,
      h5,
      h6 {
        color: #000;
        margin-top: 1.2em;
      }
      a {
        color: #0066cc;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
        color: #0052a3;
      }
      a.tag-link {
        color: #006600;
        font-weight: bold;
        text-decoration: none;
      }
      a.tag-link:hover {
        text-decoration: underline;
        color: #004400;
      }
      pre {
        background: #f5f4f0;
        border: 1px solid #ddd;
        padding: 15px;
        border-radius: 4px;
        overflow-x: auto;
        font-family: "Triplicate", "Courier New", monospace;
      }
      code {
        background: #f5f4f0;
        padding: 2px 6px;
        border-radius: 3px;
        font-family: "Triplicate", "Courier New", monospace;
        font-size: 0.9em;
      }
      pre code {
        background: none;
        padding: 0;
      }
      blockquote {
        border-left: 4px solid #333;
        padding-left: 20px;
        margin: 1em 0;
        color: #555;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        margin: 1em 0;
      }
      table th,
      table td {
        border: 1px solid #ccc;
        padding: 8px 12px;
        text-align: left;
      }
      table th {
        background: #f5f4f0;
        color: #000;
        font-weight: bold;
      }
      table tr:nth-child(even) {
        background: #f9f8f5;
      }
      .nav {
        position: sticky;
        top: 0;
        background: #faf9f6;
        z-index: 100;
        margin-bottom: 30px;
        padding-bottom: 10px;
        border-bottom: 2px solid #ccc;
        padding-top: 10px;
      }
      .file-list {
        list-style: none;
        padding: 0;
      }
      .file-list li {
        margin: 10px 0;
        padding: 5px 0;
      }
      .file-list a {
        font-size: 1.1em;
      }
      .tree {
        font-family: "Triplicate", "Courier New", monospace;
        white-space: pre;
        line-height: 1.6;
      }
      .tree a {
        color: #0066cc;
        text-decoration: none;
      }
      .tree a:hover {
        text-decoration: underline;
      }
      .content {
        line-height: 1.7;
      }
      /* Highlight matched text */
      .search-highlight {
        background: #fffacd;
        padding: 4px 8px;
        border-radius: 2px;
        border-left: 3px solid #f0e68c;
        margin: 2px 0;
      }
      .breadcrumb {
        font-family: "Triplicate", "Courier New", monospace;
        font-size: 0.95em;
        margin-bottom: 10px;
      }
      .breadcrumb a {
        color: #0066cc;
        text-decoration: none;
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb .separator {
        margin: 0 8px;
        color: #999;
      }
      .breadcrumb .current {
        color: #333;
        font-weight: bold;
      }
      ul,
      ol {
        color: #000;
        margin: 1em 0;
        padding-left: 0;
        list-style-position: outside;
      }
      ul {
        margin-left: 16px;
      }
      ol {
        margin-left: 24px;
      }
      li {
        margin: 0.5em 0;
      }
      ul > li {
        padding-left: 8px;
      }
      ul ul,
      ol ol,
      ul ol,
      ol ul {
        margin: 0.5em 0 0.5em 24px;
      }
      hr {
        border: none;
        border-top: 1px solid #ccc;
        margin: 2em 0;
      }
      strong {
        color: #000;
        font-weight: bold;
      }
      em {
        color: #000;
        font-style: italic;
      }
      div.break {
        height: 0.75em;
      }
      .content p {
        margin: 0;
      }
      /* Task list styling */
      .task-list-item {
        list-style: none;
        margin-left: -1.5em;
      }
      .task-list-item input[type="checkbox"] {
        margin-right: 0.5em;
      }
      .search-container {
        position: relative;
        margin-top: 10px;
      }
      .search-container input[type="text"] {
        width: 100%;
        font-family: "Triplicate", "Courier New", monospace;
        font-size: 1em;
        padding: 8px 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
        box-sizing: border-box;
      }
      .search-container input[type="text"]:focus {
        outline: none;
        border-color: #0066cc;
        box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
      }
      .search-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        max-height: 500px;
        overflow-y: auto;
        background: #fff;
        border: 1px solid #ccc;
        border-top: none;
        border-radius: 0 0 4px 4px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        display: none;
        z-index: 1000;
        margin-top: -1px;
      }
      .search-dropdown.visible {
        display: block;
      }
      .search-result {
        padding: 8px 12px;
        border-bottom: 1px solid #eee;
        font-family: "Triplicate", "Courier New", monospace;
        line-height: 1.5;
        font-size: 0.9em;
      }
      .search-result:last-child {
        border-bottom: none;
      }
      .search-result:hover,
      .search-result.selected {
        background: #f5f4f0;
      }
      .search-result.selected {
        border-left: 3px solid #0066cc;
      }
      .search-result a {
        color: #0066cc;
        font-weight: bold;
        text-decoration: none;
      }
      .search-result a:hover {
        text-decoration: underline;
      }
      .search-result.search-meta {
        color: #666;
        font-style: italic;
        background: #f9f8f5;
      }
    </style>
  </head>
  <body>
    <div class="nav">
      <div class="breadcrumb">
        <a href="/">notes</a>
        {{if not .IsIndex}}
        <script>
          // Split path and inject separators
          (function () {
            const path = "{{.Path}}";
            const parts = path.split("/");
            const breadcrumb = document.currentScript.parentElement;

            parts.forEach((part, index) => {
              const sep = document.createElement("span");
              sep.className = "separator";
              sep.textContent = "/";
              breadcrumb.appendChild(sep);

              const span = document.createElement("span");
              if (index === parts.length - 1) {
                span.className = "current";
              }
              span.textContent = part;
              breadcrumb.appendChild(span);
            });
          })();
        </script>
        {{end}}
      </div>
      <div class="search-container">
        <input
          type="text"
          id="search-input"
          placeholder="🔍 Search..."
          autocomplete="off"
        />
        <div id="search-dropdown" class="search-dropdown"></div>
      </div>
    </div>
    {{if .IsIndex}}
    <h1>God's Teeth Campaign Notes</h1>
    {{.TreeHTML}} {{else}}
    <div class="content">{{.Content}}</div>
    {{end}}

    <script>
      (function () {
        const searchInput = document.getElementById("search-input");
        const searchDropdown = document.getElementById("search-dropdown");
        let debounceTimer;
        let selectedIndex = -1;

        // Get all result elements
        function getResults() {
          return Array.from(
            searchDropdown.querySelectorAll(".search-result:not(.search-meta)"),
          );
        }

        // Update selected result styling
        function updateSelection() {
          const results = getResults();
          results.forEach((result, index) => {
            if (index === selectedIndex) {
              result.classList.add("selected");
              result.scrollIntoView({ block: "nearest" });
            } else {
              result.classList.remove("selected");
            }
          });
        }

        // Navigate to selected result
        function navigateToSelected() {
          const results = getResults();
          if (selectedIndex >= 0 && selectedIndex < results.length) {
            const link = results[selectedIndex].querySelector("a");
            if (link) {
              window.location.href = link.href;
            }
          }
        }

        // Debounced search function
        function performSearch(query) {
          if (!query.trim()) {
            searchDropdown.classList.remove("visible");
            searchDropdown.innerHTML = "";
            selectedIndex = -1;
            return;
          }

          fetch("/search?q=" + encodeURIComponent(query))
            .then((response) => response.text())
            .then((html) => {
              searchDropdown.innerHTML = html;
              searchDropdown.classList.add("visible");
              selectedIndex = -1;
            })
            .catch((error) => {
              console.error("Search error:", error);
              searchDropdown.innerHTML =
                '<div class="search-result">Error performing search</div>';
              searchDropdown.classList.add("visible");
              selectedIndex = -1;
            });
        }

        // Listen to input events
        searchInput.addEventListener("input", function (e) {
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(function () {
            performSearch(e.target.value);
          }, 300); // 300ms debounce
        });

        // Close dropdown when clicking outside
        document.addEventListener("click", function (e) {
          if (!e.target.closest(".search-container")) {
            searchDropdown.classList.remove("visible");
            selectedIndex = -1;
          }
        });

        // Show dropdown again when focusing on input with existing query
        searchInput.addEventListener("focus", function (e) {
          if (e.target.value.trim() && searchDropdown.innerHTML) {
            searchDropdown.classList.add("visible");
          }
        });

        // Handle keyboard navigation in search input
        searchInput.addEventListener("keydown", function (e) {
          const results = getResults();

          if (e.key === "ArrowDown") {
            e.preventDefault();
            if (results.length > 0) {
              selectedIndex = Math.min(selectedIndex + 1, results.length - 1);
              updateSelection();
            }
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            if (results.length > 0) {
              selectedIndex = Math.max(selectedIndex - 1, -1);
              updateSelection();
            }
          } else if (e.key === "Enter") {
            e.preventDefault();
            navigateToSelected();
          } else if (e.key === "Escape") {
            searchDropdown.classList.remove("visible");
            searchInput.blur();
            selectedIndex = -1;
          }
        });

        // Global keyboard shortcuts
        document.addEventListener("keydown", function (e) {
          // Ctrl-L, Ctrl-K or / to focus search
          if (
            (e.ctrlKey && e.key === "l") ||
            (e.ctrlKey && e.key === "k") ||
            (e.key === "/" && !isTypingInInput(e.target))
          ) {
            e.preventDefault();
            searchInput.focus();
            searchInput.select();
          }
        });

        // Helper to check if user is typing in an input
        function isTypingInInput(element) {
          return (
            element.tagName === "INPUT" ||
            element.tagName === "TEXTAREA" ||
            element.isContentEditable
          );
        }

        // Highlight matched text from query parameter
        function highlightSearchMatch() {
          const params = new URLSearchParams(window.location.search);
          const highlightText = params.get("highlight");

          if (!highlightText) {
            return;
          }

          // URLSearchParams.get() doesn't decode + to spaces, so we need to do it manually
          const decodedHighlight = highlightText.replace(/\+/g, " ");

          const content = document.querySelector(".content");
          if (!content) {
            return;
          }

          // Find and highlight the text
          const textToFind = decodedHighlight.trim();
          if (!textToFind) {
            return;
          }

          // Walk through text nodes and highlight matches
          let matchCount = 0;
          let firstMatch = null;
          function highlightInNode(node) {
            if (node.nodeType === Node.TEXT_NODE) {
              const text = node.textContent;
              const lowerText = text.toLowerCase();
              const lowerSearch = textToFind.toLowerCase();
              const index = lowerText.indexOf(lowerSearch);

              if (index !== -1) {
                matchCount++;

                // Find the block-level parent to highlight the whole line
                let blockParent = node.parentNode;
                while (blockParent && blockParent !== content) {
                  const tag = blockParent.tagName;
                  if (tag === 'P' || tag === 'LI' || tag === 'BLOCKQUOTE' ||
                      tag === 'H1' || tag === 'H2' || tag === 'H3' ||
                      tag === 'H4' || tag === 'H5' || tag === 'H6' ||
                      tag === 'TD' || tag === 'TH') {
                    break;
                  }
                  blockParent = blockParent.parentNode;
                }

                // Store first match for scrolling later (skip tag links)
                if (!firstMatch) {
                  // Check if this match is inside a tag-link
                  let parent = node.parentNode;
                  let isInTagLink = false;
                  while (parent && parent !== content) {
                    if (parent.tagName === 'A' && parent.className === 'tag-link') {
                      isInTagLink = true;
                      break;
                    }
                    parent = parent.parentNode;
                  }

                  if (!isInTagLink && blockParent && blockParent !== content) {
                    firstMatch = blockParent;
                    blockParent.classList.add('search-highlight');
                  }
                } else if (blockParent && blockParent !== content) {
                  // Highlight additional matches
                  blockParent.classList.add('search-highlight');
                }

                return node;
              }
            } else if (
              node.nodeType === Node.ELEMENT_NODE &&
              node.nodeName !== "SCRIPT" &&
              node.nodeName !== "STYLE"
            ) {
              Array.from(node.childNodes).forEach(highlightInNode);
            }
          }

          highlightInNode(content);

          // Scroll to first match after all highlighting is complete
          if (firstMatch) {
            firstMatch.scrollIntoView({ behavior: "smooth", block: "center" });
          }
        }

        // Run on page load
        if (document.querySelector(".content")) {
          highlightSearchMatch();
        }
      })();
    </script>
  </body>
</html>
