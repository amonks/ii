<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}} - Delta Green Notes</title>
    <style>
      @font-face {
        font-family: "Triplicate";
        src: url("/fonts/Triplicate OT A Regular.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: "Triplicate";
        src: url("/fonts/Triplicate OT A Bold.otf") format("opentype");
        font-weight: bold;
        font-style: normal;
      }
      @font-face {
        font-family: "Triplicate";
        src: url("/fonts/Triplicate OT A Italic.otf") format("opentype");
        font-weight: normal;
        font-style: italic;
      }
      @font-face {
        font-family: "Triplicate";
        src: url("/fonts/Triplicate OT A Bold Italic.otf") format("opentype");
        font-weight: bold;
        font-style: italic;
      }
      body {
        font-family: "Triplicate", "Courier New", monospace;
        line-height: 1.6;
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
        background: #faf9f6;
        color: #000;
      }
      h1 {
        color: #000;
        border-bottom: 2px solid #000;
        padding-bottom: 0.5em;
        margin-top: 1.5em;
      }
      h2 {
        color: #000;
        border-bottom: 1px solid #ccc;
        padding-bottom: 0.3em;
        margin-top: 1.5em;
      }
      h3,
      h4,
      h5,
      h6 {
        color: #000;
        margin-top: 1.2em;
      }
      a {
        color: #0066cc;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
        color: #0052a3;
      }
      pre {
        background: #f5f4f0;
        border: 1px solid #ddd;
        padding: 15px;
        border-radius: 4px;
        overflow-x: auto;
        font-family: "Triplicate", "Courier New", monospace;
      }
      code {
        background: #f5f4f0;
        padding: 2px 6px;
        border-radius: 3px;
        font-family: "Triplicate", "Courier New", monospace;
        font-size: 0.9em;
      }
      pre code {
        background: none;
        padding: 0;
      }
      blockquote {
        border-left: 4px solid #333;
        padding-left: 15px;
        margin: 1em 0;
        color: #555;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        margin: 1em 0;
      }
      table th,
      table td {
        border: 1px solid #ccc;
        padding: 8px 12px;
        text-align: left;
      }
      table th {
        background: #f5f4f0;
        color: #000;
        font-weight: bold;
      }
      table tr:nth-child(even) {
        background: #f9f8f5;
      }
      .nav {
        margin-bottom: 30px;
        padding-bottom: 10px;
        border-bottom: 2px solid #ccc;
      }
      .file-list {
        list-style: none;
        padding: 0;
      }
      .file-list li {
        margin: 10px 0;
        padding: 5px 0;
      }
      .file-list a {
        font-size: 1.1em;
      }
      .tree {
        font-family: "Triplicate", "Courier New", monospace;
        white-space: pre;
        line-height: 1.6;
      }
      .tree a {
        color: #0066cc;
        text-decoration: none;
      }
      .tree a:hover {
        text-decoration: underline;
      }
      .content {
        line-height: 1.7;
      }
      .file-path {
        font-family: "Triplicate", "Courier New", monospace;
        font-size: 0.85em;
        color: #666;
        margin-bottom: 1.5em;
        display: block;
      }
      ul,
      ol {
        color: #000;
        margin: 1em 0;
        padding-left: 2em;
      }
      li {
        margin: 0.5em 0;
      }
      ul ul,
      ol ol,
      ul ol,
      ol ul {
        margin: 0.5em 0;
      }
      hr {
        border: none;
        border-top: 1px solid #ccc;
        margin: 2em 0;
      }
      strong {
        color: #000;
        font-weight: bold;
      }
      em {
        color: #000;
        font-style: italic;
      }
      /* Task list styling */
      .task-list-item {
        list-style: none;
        margin-left: -1.5em;
      }
      .task-list-item input[type="checkbox"] {
        margin-right: 0.5em;
      }
    </style>
  </head>
  <body>
    <div class="nav">
      <a href="/">📁 All Files</a>
    </div>
    {{if .IsIndex}}
    <h1>Delta Green Campaign Notes</h1>
    {{.TreeHTML}} {{else}}
    <div class="file-path">📄 {{.Path}}</div>
    <div class="content">{{.Content}}</div>
    {{end}}
  </body>
</html>
