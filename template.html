<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}} - Delta Green Notes</title>
    <style>
      @font-face {
        font-family: "Triplicate";
        src: url("/fonts/Triplicate OT A Regular.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: "Triplicate";
        src: url("/fonts/Triplicate OT A Bold.otf") format("opentype");
        font-weight: bold;
        font-style: normal;
      }
      @font-face {
        font-family: "Triplicate";
        src: url("/fonts/Triplicate OT A Italic.otf") format("opentype");
        font-weight: normal;
        font-style: italic;
      }
      @font-face {
        font-family: "Triplicate";
        src: url("/fonts/Triplicate OT A Bold Italic.otf") format("opentype");
        font-weight: bold;
        font-style: italic;
      }
      body {
        font-family: "Triplicate", "Courier New", monospace;
        line-height: 1.6;
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
        background: #faf9f6;
        color: #000;
      }
      h1 {
        color: #000;
        border-bottom: 2px solid #000;
        padding-bottom: 0.5em;
        margin-top: 1.5em;
      }
      h2 {
        color: #000;
        border-bottom: 1px solid #ccc;
        padding-bottom: 0.3em;
        margin-top: 1.5em;
      }
      h3,
      h4,
      h5,
      h6 {
        color: #000;
        margin-top: 1.2em;
      }
      a {
        color: #0066cc;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
        color: #0052a3;
      }
      pre {
        background: #f5f4f0;
        border: 1px solid #ddd;
        padding: 15px;
        border-radius: 4px;
        overflow-x: auto;
        font-family: "Triplicate", "Courier New", monospace;
      }
      code {
        background: #f5f4f0;
        padding: 2px 6px;
        border-radius: 3px;
        font-family: "Triplicate", "Courier New", monospace;
        font-size: 0.9em;
      }
      pre code {
        background: none;
        padding: 0;
      }
      blockquote {
        border-left: 4px solid #333;
        padding-left: 15px;
        margin: 1em 0;
        color: #555;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        margin: 1em 0;
      }
      table th,
      table td {
        border: 1px solid #ccc;
        padding: 8px 12px;
        text-align: left;
      }
      table th {
        background: #f5f4f0;
        color: #000;
        font-weight: bold;
      }
      table tr:nth-child(even) {
        background: #f9f8f5;
      }
      .nav {
        position: sticky;
        top: 0;
        background: #faf9f6;
        z-index: 100;
        margin-bottom: 30px;
        padding-bottom: 10px;
        border-bottom: 2px solid #ccc;
        padding-top: 10px;
      }
      .file-list {
        list-style: none;
        padding: 0;
      }
      .file-list li {
        margin: 10px 0;
        padding: 5px 0;
      }
      .file-list a {
        font-size: 1.1em;
      }
      .tree {
        font-family: "Triplicate", "Courier New", monospace;
        white-space: pre;
        line-height: 1.6;
      }
      .tree a {
        color: #0066cc;
        text-decoration: none;
      }
      .tree a:hover {
        text-decoration: underline;
      }
      .content {
        line-height: 1.7;
      }
      /* Highlight matched text */
      mark.search-highlight {
        background: #fffacd;
        padding: 2px 4px;
        border-radius: 2px;
        font-weight: bold;
      }
      .file-path {
        font-family: "Triplicate", "Courier New", monospace;
        font-size: 0.85em;
        color: #666;
        margin-bottom: 1.5em;
        display: block;
      }
      ul,
      ol {
        color: #000;
        margin: 1em 0;
        padding-left: 2em;
      }
      li {
        margin: 0.5em 0;
      }
      ul ul,
      ol ol,
      ul ol,
      ol ul {
        margin: 0.5em 0;
      }
      hr {
        border: none;
        border-top: 1px solid #ccc;
        margin: 2em 0;
      }
      strong {
        color: #000;
        font-weight: bold;
      }
      em {
        color: #000;
        font-style: italic;
      }
      /* Task list styling */
      .task-list-item {
        list-style: none;
        margin-left: -1.5em;
      }
      .task-list-item input[type="checkbox"] {
        margin-right: 0.5em;
      }
      .search-container {
        position: relative;
        margin-top: 10px;
      }
      .search-container input[type="text"] {
        width: 100%;
        font-family: "Triplicate", "Courier New", monospace;
        font-size: 1em;
        padding: 8px 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
        box-sizing: border-box;
      }
      .search-container input[type="text"]:focus {
        outline: none;
        border-color: #0066cc;
        box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
      }
      .search-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        max-height: 500px;
        overflow-y: auto;
        background: #fff;
        border: 1px solid #ccc;
        border-top: none;
        border-radius: 0 0 4px 4px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        display: none;
        z-index: 1000;
        margin-top: -1px;
      }
      .search-dropdown.visible {
        display: block;
      }
      .search-result {
        padding: 8px 12px;
        border-bottom: 1px solid #eee;
        font-family: "Triplicate", "Courier New", monospace;
        line-height: 1.5;
        font-size: 0.9em;
      }
      .search-result:last-child {
        border-bottom: none;
      }
      .search-result:hover,
      .search-result.selected {
        background: #f5f4f0;
      }
      .search-result.selected {
        border-left: 3px solid #0066cc;
      }
      .search-result a {
        color: #0066cc;
        font-weight: bold;
        text-decoration: none;
      }
      .search-result a:hover {
        text-decoration: underline;
      }
      .search-result.search-meta {
        color: #666;
        font-style: italic;
        background: #f9f8f5;
      }
    </style>
  </head>
  <body>
    <div class="nav">
      <a href="/">📁 All Files</a>
      <div class="search-container">
        <input
          type="text"
          id="search-input"
          placeholder="🔍 Search..."
          autocomplete="off"
        />
        <div id="search-dropdown" class="search-dropdown"></div>
      </div>
    </div>
    {{if .IsIndex}}
    <h1>Delta Green Campaign Notes</h1>
    {{.TreeHTML}}
    {{else}}
    <div class="file-path">📄 {{.Path}}</div>
    <div class="content">{{.Content}}</div>
    {{end}}

    <script>
      (function () {
        const searchInput = document.getElementById("search-input");
        const searchDropdown = document.getElementById("search-dropdown");
        let debounceTimer;
        let selectedIndex = -1;

        // Get all result elements
        function getResults() {
          return Array.from(
            searchDropdown.querySelectorAll(".search-result:not(.search-meta)")
          );
        }

        // Update selected result styling
        function updateSelection() {
          const results = getResults();
          results.forEach((result, index) => {
            if (index === selectedIndex) {
              result.classList.add("selected");
              result.scrollIntoView({ block: "nearest" });
            } else {
              result.classList.remove("selected");
            }
          });
        }

        // Navigate to selected result
        function navigateToSelected() {
          const results = getResults();
          if (selectedIndex >= 0 && selectedIndex < results.length) {
            const link = results[selectedIndex].querySelector("a");
            if (link) {
              window.location.href = link.href;
            }
          }
        }

        // Debounced search function
        function performSearch(query) {
          if (!query.trim()) {
            searchDropdown.classList.remove("visible");
            searchDropdown.innerHTML = "";
            selectedIndex = -1;
            return;
          }

          fetch("/search?q=" + encodeURIComponent(query))
            .then((response) => response.text())
            .then((html) => {
              searchDropdown.innerHTML = html;
              searchDropdown.classList.add("visible");
              selectedIndex = -1;
            })
            .catch((error) => {
              console.error("Search error:", error);
              searchDropdown.innerHTML =
                '<div class="search-result">Error performing search</div>';
              searchDropdown.classList.add("visible");
              selectedIndex = -1;
            });
        }

        // Listen to input events
        searchInput.addEventListener("input", function (e) {
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(function () {
            performSearch(e.target.value);
          }, 300); // 300ms debounce
        });

        // Close dropdown when clicking outside
        document.addEventListener("click", function (e) {
          if (!e.target.closest(".search-container")) {
            searchDropdown.classList.remove("visible");
            selectedIndex = -1;
          }
        });

        // Show dropdown again when focusing on input with existing query
        searchInput.addEventListener("focus", function (e) {
          if (e.target.value.trim() && searchDropdown.innerHTML) {
            searchDropdown.classList.add("visible");
          }
        });

        // Handle keyboard navigation in search input
        searchInput.addEventListener("keydown", function (e) {
          const results = getResults();

          if (e.key === "ArrowDown") {
            e.preventDefault();
            if (results.length > 0) {
              selectedIndex = Math.min(selectedIndex + 1, results.length - 1);
              updateSelection();
            }
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            if (results.length > 0) {
              selectedIndex = Math.max(selectedIndex - 1, -1);
              updateSelection();
            }
          } else if (e.key === "Enter") {
            e.preventDefault();
            navigateToSelected();
          } else if (e.key === "Escape") {
            searchDropdown.classList.remove("visible");
            searchInput.blur();
            selectedIndex = -1;
          }
        });

        // Global keyboard shortcuts
        document.addEventListener("keydown", function (e) {
          // Ctrl-L or / to focus search
          if (
            (e.ctrlKey && e.key === "l") ||
            (e.key === "/" && !isTypingInInput(e.target))
          ) {
            e.preventDefault();
            searchInput.focus();
            searchInput.select();
          }
        });

        // Helper to check if user is typing in an input
        function isTypingInInput(element) {
          return (
            element.tagName === "INPUT" ||
            element.tagName === "TEXTAREA" ||
            element.isContentEditable
          );
        }

        // Highlight matched text from query parameter
        function highlightSearchMatch() {
          const params = new URLSearchParams(window.location.search);
          const highlightText = params.get("highlight");

          if (!highlightText) {
            return;
          }

          const content = document.querySelector(".content");
          if (!content) {
            return;
          }

          // Find and highlight the text
          const textToFind = highlightText.trim();
          if (!textToFind) {
            return;
          }

          // Walk through text nodes and highlight matches
          function highlightInNode(node) {
            if (node.nodeType === Node.TEXT_NODE) {
              const text = node.textContent;
              const lowerText = text.toLowerCase();
              const lowerSearch = textToFind.toLowerCase();
              const index = lowerText.indexOf(lowerSearch);

              if (index !== -1) {
                const before = text.substring(0, index);
                const match = text.substring(index, index + textToFind.length);
                const after = text.substring(index + textToFind.length);

                const fragment = document.createDocumentFragment();
                if (before) fragment.appendChild(document.createTextNode(before));

                const mark = document.createElement("mark");
                mark.className = "search-highlight";
                mark.textContent = match;
                fragment.appendChild(mark);

                if (after) fragment.appendChild(document.createTextNode(after));

                node.parentNode.replaceChild(fragment, node);

                // Scroll to first match
                if (!window.hasScrolledToMatch) {
                  mark.scrollIntoView({ behavior: "smooth", block: "center" });
                  window.hasScrolledToMatch = true;
                }

                return mark;
              }
            } else if (node.nodeType === Node.ELEMENT_NODE && node.nodeName !== "SCRIPT" && node.nodeName !== "STYLE") {
              Array.from(node.childNodes).forEach(highlightInNode);
            }
          }

          window.hasScrolledToMatch = false;
          highlightInNode(content);
        }

        // Run on page load
        if (document.querySelector(".content")) {
          highlightSearchMatch();
        }
      })();
    </script>
  </body>
</html>
