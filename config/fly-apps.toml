[defaults]
  region = "ord"
  vm_size = "shared-cpu-1x"
  vm_memory = "256"

[apps.proxy]
  vm_memory = "512"
  volume = "monks_proxy_data"
  public = true
  packages = ["iptables", "ip6tables", "sqlite"]
  files = ["config/fly.toml", "static/"]
  cmd = ["/app/bin/app", "-machine", "fly"]

[apps.homepage]
  files = ["writing/"]

[apps.writing]
  vm_size = "shared-cpu-4x"
  vm_memory = "2gb"
  files = ["writing/"]

[apps.dogs]
  vm_size = "shared-cpu-2x"
  vm_memory = "1gb"
  volume = "monks_dogs_data"
  packages = ["sqlite"]

[apps.traffic]
  vm_memory = "512"
  volume = "monks_traffic_data"
  packages = ["sqlite"]

[apps.errlog]
  volume = "monks_errlog_data"
  packages = ["sqlite"]

[apps.map]
  volume = "monks_map_data"
  packages = ["sqlite"]

[apps.mailer]
