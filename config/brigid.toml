mode = "dev"

[[service]]
  type = "redirect-to-https"
  addr = "0.0.0.0:80"

[[service]]
  type = "https"
  addr = "0.0.0.0:443"
  rewrites = { "/" = "/homepage/" }
  apps = [
    "golink",
    "map",
    "ping",
    "posts",
    "sms",
    "traffic",
    "youtube",
    "directory",
    "homepage",
    "dogs"
  ]

[acme]
  storage_path = "cache"
  production = true
  domains = ["brigid.ss.cx"]

  [[acme.strategies]]
    strategy = "dns"

